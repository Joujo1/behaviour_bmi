{% extends "base.html" %}

{% block title %}BMI Closed Loop{% endblock %}

{% block head_extra %}
<style>
  header input {
    border: 1px solid var(--border);
    background: var(--bg-faint);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    width: 160px;
  }
  header input:focus { border-color: var(--fg); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: none;
  }

  /* ── Cage card ── */
  .cage-card {
    background: var(--bg);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }

  .adv-popup {
    display: none;
    position: absolute;
    inset: 0;
    font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #000;
    align-items: center; justify-content: center;
    text-align: center;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .adv-popup.visible  { display: flex; }
  .adv-popup.advance  { background: rgba(64, 202, 114, 0.88); }
  .adv-popup.fallback { background: rgba(205, 20, 20, 0.88); color: #fff; }
  .adv-popup-close {
    background: none; border: 1.5px solid currentColor; cursor: pointer;
    font-family: inherit; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 10px; color: inherit; opacity: 0.8;
  }
  .adv-popup-close:hover { opacity: 1; }

  .cage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .cage-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--dead);
    flex-shrink: 0;
    align-self: center;
  }
  .status-dot.alive    { background: var(--alive); }
  .status-dot.stopped  { background: var(--fg-faint); }

  .cage-img-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg-faint);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .camera-lost {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(205, 20, 20, 0.85);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
    flex-direction: column;
  }
  .camera-lost.visible { display: flex; }

  .cage-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cage-img-wrap .no-feed {
    font-size: 0.7rem;
    color: var(--fg-faint);
    letter-spacing: 0.05em;
  }

  .cage-stats {
    display: flex;
    gap: 8px;
    font-size: 0.68rem;
    color: var(--fg-faint);
    flex: 1;
    justify-content: center;
  }
  .cage-stats span { font-weight: 600; color: var(--fg); }

  /* ── Per-cage session controls ── */
  .cage-session {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .cage-subject-sel {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--border);
    background: var(--bg-faint);
    padding: 4px 6px;
    font-family: inherit;
    font-size: 0.75rem;
    outline: none;
    color: var(--fg);
  }
  .cage-subject-sel:focus { border-color: var(--fg); }

  .session-status {
    font-size: 0.65rem;
    color: var(--fg-faint);
    min-height: 1em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-status.active {
    color: var(--alive);
    font-weight: 700;
  }

  .cage-actions {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: center;
  }

  .periph-btn {
    display: flex; align-items: center; gap: 4px;
  }
  .periph-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--fg-faint); flex-shrink: 0;
    align-self: center;
  }
  .periph-dot.on { background: var(--alive); }

  /* ── Dev strip ── */
  #dev-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 24px;
    background: var(--bg-faint);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  #dev-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--fg-faint);
    margin-right: 4px;
  }

  /* ── Run status per cage ── */
  .run-status {
    font-size: 0.65rem;
    color: var(--fg-faint);
    min-height: 1em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .run-status.active {
    color: var(--alive);
    font-weight: 700;
  }

  .run-timer {
    font-size: 0.68rem;
    color: var(--fg-faint);
    font-variant-numeric: tabular-nums;
    min-width: 2.4em;
    text-align: right;
  }
  .run-timer.active { color: var(--alive); font-weight: 700; }

  /* ── Global bottom bar ── */
  #global-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    background: var(--bg-faint);
    border-top: 2px solid var(--fg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #global-bar-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--fg-faint);
    margin-right: 4px;
  }
</style>
{% endblock %}

{% block header_title %}BMI Closed Loop{% endblock %}

{% block header_content %}
  <input type="text" id="inp-researcher" placeholder="researcher" />
  <button class="btn small" onclick="loadSubjects()">↻ Subjects</button>
{% endblock %}

{% block content %}
<div id="dev-strip">
  <span id="dev-label">DEV</span>
  <button class="btn small" onclick="truncate('trial_results')">Truncate trial_results</button>
  <button class="btn small" onclick="truncate('recordings')">Truncate recordings</button>
  <button class="btn small" onclick="truncate('sessions')">Truncate sessions</button>
  <button class="btn small" onclick="truncate('subjects')">Truncate subjects</button>
  <button class="btn small" onclick="truncate('training_substages')">Truncate training_substages</button>
  <button class="btn small" onclick="truncate('training_stages')">Truncate training_stages</button>
</div>

<div class="grid" id="cage-grid"></div>

<div id="global-bar">
  <span id="global-bar-label">ALL CAGES</span>
  <button class="btn small" onclick="openAllSessions()">Open All Sessions</button>
  <button class="btn small" onclick="closeAllSessions()">Close All Sessions</button>
  <button class="btn small" onclick="startAllTrials()">Start All Trials</button>
  <button class="btn small" onclick="stopAllTrials()">Stop All Trials</button>
  <button class="btn small" onclick="startAllStreams()">Start All Streams</button>
  <button class="btn small" onclick="stopAllStreams()">Stop All Streams</button>
  <button class="btn small" onclick="startAllFans()">Start All Fans</button>
  <button class="btn small" onclick="stopAllFans()">Stop All Fans</button>
  <button class="btn small" onclick="startAllStrips()">Start All LEDs</button>
  <button class="btn small" onclick="stopAllStrips()">Stop All LEDs</button>
</div>
{% endblock %}

{% block scripts %}
<script>
  const N_CAGES = {{ n_cages }};

  // Per-cage state
  const cageState = {};
  for (let i = 1; i <= N_CAGES; i++) {
    cageState[i] = { sessionId: null, sessionNumber: null, subjectId: null, substageId: null };
  }

  const FAN_MIN  = {{ fan_min_duty }};  // from config.py — adjust after testing
  const FAN_STEP = 10;

  let allSubjects  = [];
  let streamActive = {};
  const fanDuty    = {};  // cage_id → 0–100 (0 = off)
  const stripActive = {};
  const lastAdvTs  = {}; // cage_id → last seen advancement ts
  const runStartedAt = {}; // cage_id → epoch seconds (null if not running)

  // ── Build grid ──────────────────────────────────────────
  const grid = document.getElementById('cage-grid');
  for (let i = 1; i <= N_CAGES; i++) {
    streamActive[i] = false;
    fanDuty[i]      = 0;
    grid.innerHTML += `
      <div class="cage-card" id="card-${i}">
        <div class="cage-header">
          <span class="cage-title">Cage ${i}</span>
          <div class="cage-stats">
            <span id="fps-${i}">—</span> fps &nbsp;
            <span id="drops-${i}">0</span> q &nbsp;
            <span id="netdrops-${i}" style="color:var(--dead)">0</span> net
          </div>
          <span class="periph-btn" style="margin-left:auto;gap:6px">
            <button class="btn small" onclick="stepFan(${i}, -FAN_STEP)" style="padding:3px 6px">−</button>
            <span id="fan-duty-${i}" style="font-size:0.65rem;min-width:2.4em;text-align:center;font-variant-numeric:tabular-nums">OFF</span>
            <button class="btn small" onclick="stepFan(${i}, +FAN_STEP)" style="padding:3px 6px;filter:grayscale(1)">🌀</button>
            <span class="periph-dot" id="dot-fan-${i}"></span>
          </span>
          <span class="periph-btn" style="gap:6px">
            <button class="btn small" onclick="toggleStrip(${i})" style="filter:grayscale(1)">💡</button>
            <span class="periph-dot" id="dot-strip-${i}"></span>
          </span>
        </div>
        <div class="cage-img-wrap" id="wrap-${i}">
          <span class="no-feed">no feed</span>
          <div class="camera-lost" id="lost-${i}">
            <span>&#9888; Camera Lost</span>
            <span id="lost-elapsed-${i}" style="font-size:0.65rem;font-weight:400;letter-spacing:0.05em"></span>
          </div>
          <div class="adv-popup" id="adv-popup-${i}">
            <span id="adv-popup-msg-${i}"></span>
            <span id="adv-popup-sub-${i}" style="font-size:0.65rem;font-weight:400;letter-spacing:0.05em"></span>
            <button class="adv-popup-close" onclick="dismissAdv(${i})">Dismiss</button>
          </div>
        </div>
        <div class="cage-session">
          <select id="subject-${i}" class="cage-subject-sel" onchange="onCageSubjectSelected(${i})">
            <option value="">— subject —</option>
          </select>
          <button class="btn small" id="btn-open-${i}" onclick="openCageSession(${i})" disabled>Open</button>
          <button class="btn small" id="btn-close-${i}" onclick="closeCageSession(${i})" disabled>Close</button>
        </div>
        <div id="session-status-${i}" class="session-status"></div>
        <div id="run-status-${i}" class="run-status"></div>
        <div class="cage-actions">
          <button class="btn small" id="btn-stream-${i}" onclick="toggleStream(${i})">Stream ▶</button>
          <div class="status-dot" id="dot-${i}"></div>
          <button class="btn small" id="btn-trial-${i}"  onclick="startTrial(${i})">Trial ▶</button>
          <span class="run-timer" id="run-timer-${i}"></span>
          <button class="btn small" onclick="stopTrial(${i})" style="margin-left:auto">Trial ■</button>
        </div>
      </div>`;
  }

  // ── Subjects ─────────────────────────────────────────────
  async function loadSubjects() {
    try {
      const res = await fetch('/subjects');
      allSubjects = await res.json();
      for (let i = 1; i <= N_CAGES; i++) {
        const sel = document.getElementById(`subject-${i}`);
        const cur = sel.value;
        sel.innerHTML = '<option value="">— subject —</option>' +
          allSubjects.map(s => `<option value="${s.id}">${s.code}</option>`).join('');
        sel.value = cur;
        // Refresh substage if subject still selected and no open session
        if (cur && !cageState[i].sessionId) {
          const subject = allSubjects.find(s => s.id === parseInt(cur));
          if (subject) cageState[i].substageId = subject.current_substage_id;
          updateCageSessionUI(i);
        }
      }
    } catch (e) { toast(`Failed to load subjects: ${e.message}`); }
  }

  function onCageSubjectSelected(id) {
    const sel = document.getElementById(`subject-${id}`);
    const subjectId = parseInt(sel.value);
    if (!subjectId) {
      cageState[id].subjectId  = null;
      cageState[id].substageId = null;
    } else {
      const subject = allSubjects.find(s => s.id === subjectId);
      cageState[id].subjectId  = subjectId;
      cageState[id].substageId = subject?.current_substage_id || null;
    }
    updateCageSessionUI(id);
  }

  function updateCageSessionUI(id) {
    const state   = cageState[id];
    const statusEl = document.getElementById(`session-status-${id}`);
    const openBtn  = document.getElementById(`btn-open-${id}`);
    const closeBtn = document.getElementById(`btn-close-${id}`);

    if (state.sessionId) {
      statusEl.textContent = `session ${state.sessionNumber ?? state.sessionId}`;
      statusEl.className   = 'session-status active';
      openBtn.disabled     = true;
      closeBtn.disabled    = false;
    } else {
      const subject = allSubjects.find(s => s.id === state.subjectId);
      if (subject) {
        const label = subject.stage_name
          ? `${subject.stage_name} › ${subject.substage_label || '?'}`
          : (subject.substage_label || 'no substage');
        statusEl.textContent = label;
      } else {
        statusEl.textContent = '';
      }
      statusEl.className = 'session-status';
      openBtn.disabled   = !state.subjectId;
      closeBtn.disabled  = true;
    }
  }

  // ── Session open / close ─────────────────────────────────
  async function openCageSession(id) {
    const state = cageState[id];
    if (!state.subjectId) { toast(`Cage ${id}: select a subject first`); return; }
    const researcher = document.getElementById('inp-researcher').value.trim();
    const res = await post('/session/open', {
      cage_id:    id,
      subject_id: state.subjectId,
      researcher,
    });
    if (res.ok && res.data.ok) {
      cageState[id].sessionId     = res.data.session_id;
      cageState[id].sessionNumber = res.data.session_number;
      cageState[id].substageId    = res.data.substage_id;
      updateCageSessionUI(id);
      toast(`Cage ${id}: session ${res.data.session_number} opened`);
    } else {
      toast(`Cage ${id}: ${res.data?.msg || 'failed to open session'}`);
    }
  }

  async function closeCageSession(id) {
    const state = cageState[id];
    if (!state.sessionId) return;
    await post(`/session/${state.sessionId}/close`);
    toast(`Cage ${id}: session ${state.sessionNumber ?? state.sessionId} closed`);
    cageState[id].sessionId     = null;
    cageState[id].sessionNumber = null;
    updateCageSessionUI(id);
  }

  // ── Peripherals ──────────────────────────────────────────
  function _setPeriphDot(id, device, on) {
    const dot = document.getElementById(`dot-${device}-${id}`);
    if (dot) dot.classList.toggle('on', on);
  }

  function stepFan(id, delta) {
    let duty = fanDuty[id] || 0;
    if (delta > 0 && duty === 0) {
      duty = FAN_MIN;           // first + press jumps to minimum run speed
    } else {
      duty = Math.max(0, Math.min(100, duty + delta));
    }
    setFanDuty(id, duty);
  }

  async function setFanDuty(id, duty) {
    const res = await post(`/cage/${id}/fan`, { duty });
    if (res.ok && res.data.ok) {
      fanDuty[id] = duty;
      _updateFanUI(id, duty);
    } else {
      toast(`Cage ${id} fan: ${res.data?.msg || 'failed'}`);
    }
  }

  function _updateFanUI(id, duty) {
    _setPeriphDot(id, 'fan', duty > 0);
    const el = document.getElementById(`fan-duty-${id}`);
    if (el) el.textContent = duty > 0 ? `${duty}%` : 'OFF';
  }

  async function toggleStrip(id) {
    const next = !stripActive[id];
    const res  = await post(`/cage/${id}/strip`, { state: next });
    if (res.ok && res.data.ok) {
      stripActive[id] = next;
      _setPeriphDot(id, 'strip', next);
    } else {
      toast(`Cage ${id} strip: ${res.data?.msg || 'failed'}`);
    }
  }

  async function pollPeripherals() {
    try {
      const res  = await fetch('/cameras/peripherals');
      const data = await res.json();
      for (const [key, val] of Object.entries(data)) {
        const id = parseInt(key);
        if (val.fan_duty !== fanDuty[id]) {
          fanDuty[id] = val.fan_duty;
          _updateFanUI(id, val.fan_duty);
        }
        if (val.strip !== stripActive[id]) {
          stripActive[id] = val.strip;
          _setPeriphDot(id, 'strip', val.strip);
        }
      }
    } catch (_) {}
  }

  // ── Stream ───────────────────────────────────────────────
  async function toggleStream(id) {
    if (!streamActive[id]) {
      const res = await post(`/cage/${id}/stream/start`);
      if (res.ok && res.data.ok) {
        streamActive[id] = true;
        startImageRefresh(id);
        document.getElementById(`btn-stream-${id}`).textContent = 'Stream ■';
        toast(`Cage ${id} streaming`);
      } else {
        toast(`Cage ${id}: ${res.data?.msg || 'failed'}`);
      }
    } else {
      await post(`/cage/${id}/stream/stop`);
      streamActive[id] = false;
      stopImageRefresh(id);
      document.getElementById(`btn-stream-${id}`).textContent = 'Stream ▶';
    }
  }

  // ── Trial runner ─────────────────────────────────────────
  async function startTrial(id) {
    const state      = cageState[id];
    const substageId = state.substageId;
    const sessionId  = state.sessionId;
    if (!substageId) { toast(`Cage ${id}: no substage — select a subject`); return; }
    if (!sessionId)  { toast(`Cage ${id}: open a session first`); return; }
    const res = await post(`/cage/${id}/trial/run`, {
      substage_id: substageId,
      session_id:  sessionId,
    });
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'run started' : 'failed')}`);
  }

  async function stopTrial(id) {
    const res = await post(`/cage/${id}/trial/run/stop`);
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'stop requested' : 'failed')}`);
  }

  // ── Live image refresh ───────────────────────────────────
  const refreshTimers = {};

  function startImageRefresh(id) {
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = 'none';

    let img = document.getElementById(`img-${id}`);
    if (!img) {
      img = document.createElement('img');
      img.id = `img-${id}`;
      img.alt = `cage ${id}`;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      wrap.insertBefore(img, wrap.querySelector('.camera-lost'));
    }

    function refresh() {
      const next = new Image();
      next.onload = () => { img.src = next.src; };
      next.src = `/cage/${id}/frame?t=${Date.now()}`;
    }
    refresh();
    refreshTimers[id] = setInterval(refresh, 16.7);
  }

  function stopImageRefresh(id) {
    clearInterval(refreshTimers[id]);
    delete refreshTimers[id];
    const img = document.getElementById(`img-${id}`);
    if (img) img.remove();
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = '';
  }

  // ── Advancement notifications ────────────────────────────
  function dismissAdv(id) {
    const el = document.getElementById(`adv-popup-${id}`);
    if (el) { el.classList.remove('visible', 'advance', 'fallback'); }
  }

  async function pollAdvancement() {
    for (let i = 1; i <= N_CAGES; i++) {
      try {
        const res  = await fetch(`/cage/${i}/advancement`);
        const data = await res.json();
        if (!data) { dismissAdv(i); continue; }
        if ((lastAdvTs[i] ?? 0) >= data.ts) continue; // already shown
        lastAdvTs[i] = data.ts;

        const popup = document.getElementById(`adv-popup-${i}`);
        const msg   = document.getElementById(`adv-popup-msg-${i}`);
        if (!popup || !msg) continue;

        const arrow = data.decision === 'advance' ? '↑' : '↓';
        msg.textContent = `${arrow} ${data.decision === 'advance' ? 'Advanced' : 'Fell Back'}`;
        const sub = document.getElementById(`adv-popup-sub-${i}`);
        if (sub) sub.textContent = `→ ${data.new_label}`;
        popup.classList.remove('advance', 'fallback');
        popup.classList.add('visible', data.decision);
      } catch (_) {}
    }
  }

  // ── Run status + timer ───────────────────────────────────
  function fmtElapsed(startedAt) {
    if (!startedAt) return '';
    const s = Math.max(0, Math.round(Date.now() / 1000 - startedAt));
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    if (h > 0) return `${h}h${m % 60}m`;
    return `${m}m`;
  }

  async function pollRunStatus() {
    for (let i = 1; i <= N_CAGES; i++) {
      try {
        const res  = await fetch(`/cage/${i}/run/status`);
        const data = await res.json();
        const statusEl = document.getElementById(`run-status-${i}`);
        const timerEl  = document.getElementById(`run-timer-${i}`);
        if (data.running) {
          runStartedAt[i] = data.started_at;
          if (statusEl) {
            statusEl.textContent = data.substage_label ? `▶ ${data.substage_label}` : '▶ running';
            statusEl.className   = 'run-status active';
          }
          if (timerEl) {
            timerEl.textContent = fmtElapsed(data.started_at);
            timerEl.className   = 'run-timer active';
          }
        } else {
          runStartedAt[i] = null;
          if (statusEl) { statusEl.textContent = ''; statusEl.className = 'run-status'; }
          if (timerEl)  { timerEl.textContent  = ''; timerEl.className  = 'run-timer'; }
        }
      } catch (_) {}
    }
  }

  // ── Global bar actions ───────────────────────────────────
  async function openAllSessions() {
    const researcher = document.getElementById('inp-researcher').value.trim();
    for (let i = 1; i <= N_CAGES; i++) {
      const state = cageState[i];
      if (state.sessionId || !state.subjectId) continue;
      const res = await post('/session/open', {
        cage_id: i, subject_id: state.subjectId, researcher,
      });
      if (res.ok && res.data.ok) {
        cageState[i].sessionId     = res.data.session_id;
        cageState[i].sessionNumber = res.data.session_number;
        cageState[i].substageId    = res.data.substage_id;
        updateCageSessionUI(i);
      } else {
        toast(`Cage ${i}: ${res.data?.msg || 'failed to open session'}`);
      }
    }
  }

  async function closeAllSessions() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (!cageState[i].sessionId) continue;
      await post(`/session/${cageState[i].sessionId}/close`);
      cageState[i].sessionId     = null;
      cageState[i].sessionNumber = null;
      updateCageSessionUI(i);
    }
    toast('All sessions closed');
  }

  async function startAllTrials() {
    for (let i = 1; i <= N_CAGES; i++) {
      const state = cageState[i];
      if (!state.substageId || !state.sessionId) continue;
      await post(`/cage/${i}/trial/run`, {
        substage_id: state.substageId,
        session_id:  state.sessionId,
      });
    }
    toast('All trials started');
  }

  async function stopAllTrials() {
    for (let i = 1; i <= N_CAGES; i++) {
      await post(`/cage/${i}/trial/run/stop`);
    }
    toast('All trials stopped');
  }

  async function startAllStreams() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (streamActive[i]) continue;
      const res = await post(`/cage/${i}/stream/start`);
      if (res.ok && res.data.ok) {
        streamActive[i] = true;
        startImageRefresh(i);
        const btn = document.getElementById(`btn-stream-${i}`);
        if (btn) btn.textContent = 'Stream ■';
      }
    }
    toast('All streams started');
  }

  async function stopAllStreams() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (!streamActive[i]) continue;
      await post(`/cage/${i}/stream/stop`);
      streamActive[i] = false;
      stopImageRefresh(i);
      const btn = document.getElementById(`btn-stream-${i}`);
      if (btn) btn.textContent = 'Stream ▶';
    }
    toast('All streams stopped');
  }

  async function startAllFans() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (fanDuty[i] > 0) continue;
      const res = await post(`/cage/${i}/fan`, { duty: FAN_MIN });
      if (res.ok && res.data.ok) { fanDuty[i] = FAN_MIN; _updateFanUI(i, FAN_MIN); }
    }
    toast(`All fans started at ${FAN_MIN}%`);
  }

  async function stopAllFans() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (fanDuty[i] === 0) continue;
      const res = await post(`/cage/${i}/fan`, { duty: 0 });
      if (res.ok && res.data.ok) { fanDuty[i] = 0; _updateFanUI(i, 0); }
    }
    toast('All fans stopped');
  }

  async function startAllStrips() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (stripActive[i]) continue;
      const res = await post(`/cage/${i}/strip`, { state: true });
      if (res.ok && res.data.ok) { stripActive[i] = true; _setPeriphDot(i, 'strip', true); }
    }
    toast('All LEDs started');
  }

  async function stopAllStrips() {
    for (let i = 1; i <= N_CAGES; i++) {
      if (!stripActive[i]) continue;
      const res = await post(`/cage/${i}/strip`, { state: false });
      if (res.ok && res.data.ok) { stripActive[i] = false; _setPeriphDot(i, 'strip', false); }
    }
    toast('All LEDs stopped');
  }

  // ── Status polling ───────────────────────────────────────
  async function pollStatus() {
    try {
      const res = await fetch('/cameras/status');
      if (!res.ok) return;
      const data = await res.json();
      for (const [key, val] of Object.entries(data)) {
        const id = parseInt(key.replace('cage_', ''));
        const parts = val.split('|');
        const alive      = parts[0] === 'alive';
        const stopped    = parts[0] === 'stopped';
        const fps        = parts.find(p => p.startsWith('fps='))?.split('=')[1] ?? '—';
        const drops      = parts.find(p => p.startsWith('drops='))?.split('=')[1] ?? '0';
        const netDrops   = parts.find(p => p.startsWith('net_drops='))?.split('=')[1] ?? '0';
        const lastSeen   = parseFloat(parts.find(p => p.startsWith('last_seen='))?.split('=')[1] ?? '0');
        const isStreaming = parts.find(p => p.startsWith('streaming='))?.split('=')[1] === '1';

        // Restore stream UI if backend is streaming but JS state was reset (e.g. page navigation)
        if (isStreaming && !streamActive[id]) {
          streamActive[id] = true;
          startImageRefresh(id);
          const btn = document.getElementById(`btn-stream-${id}`);
          if (btn) btn.textContent = 'Stream ■';
        } else if (!isStreaming && streamActive[id]) {
          streamActive[id] = false;
          stopImageRefresh(id);
          const btn = document.getElementById(`btn-stream-${id}`);
          if (btn) btn.textContent = 'Stream ▶';
        }

        const dot = document.getElementById(`dot-${id}`);
        if (dot) dot.className = 'status-dot' + (alive ? ' alive' : stopped ? ' stopped' : '');
        const fpsEl = document.getElementById(`fps-${id}`);
        if (fpsEl) fpsEl.textContent = fps;
        const dropEl = document.getElementById(`drops-${id}`);
        if (dropEl) dropEl.textContent = drops;
        const netDropEl = document.getElementById(`netdrops-${id}`);
        if (netDropEl) {
          netDropEl.textContent = netDrops;
          netDropEl.style.color = netDrops === '0' ? 'var(--fg-faint)' : 'var(--dead)';
        }

        const lostEl = document.getElementById(`lost-${id}`);
        if (lostEl) {
          const wasSeen = lastSeen > 0;
          const show    = !alive && !stopped && wasSeen;
          lostEl.classList.toggle('visible', show);
          if (show) {
            const elapsed = Math.round(Date.now() / 1000 - lastSeen);
            document.getElementById(`lost-elapsed-${id}`).textContent = `silent for ${elapsed}s`;
          }
        }
      }
    } catch (_) {}
  }

  setInterval(pollStatus, 1000);
  setInterval(pollAdvancement, 2000);
  setInterval(pollPeripherals, 2000);
  setInterval(pollRunStatus, 3000);
  pollStatus();
  pollAdvancement();
  pollPeripherals();
  pollRunStatus();

  // Refresh subject list every 10s to pick up advancement changes
  setInterval(loadSubjects, 10000);

  // ── Dev helpers ───────────────────────────────────────────
  async function truncate(table) {
    if (!confirm(`Truncate ${table}? This cannot be undone.`)) return;
    const res = await post(`/dev/truncate/${table}`);
    toast(res.data?.msg || (res.ok ? 'done' : 'failed'));
  }

  // ── Init ─────────────────────────────────────────────────
  loadSubjects();
</script>
{% endblock %}
