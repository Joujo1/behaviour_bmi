<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Closed Loop</title>
  <style>
    :root {
      font-family: Futura, Inter, system-ui, Helvetica, Arial, sans-serif;
      --bg:       #ffffff;
      --bg-faint: #f0f0f0;
      --fg:       #000000;
      --fg-faint: #888888;
      --accent:   #ffd000;
      --alive:    rgb(64, 202, 114);
      --dead:     rgb(205, 20, 20);
      --border:   #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 2px solid var(--fg);
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 8px;
    }

    header input {
      border: 1px solid var(--border);
      background: var(--bg-faint);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      width: 160px;
    }

    header input:focus { border-color: var(--fg); }

    .btn {
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid var(--fg);
      background: var(--bg);
      color: var(--fg);
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: var(--fg); color: var(--bg); }
    .btn.accent { background: var(--accent); border-color: var(--accent); color: var(--fg); }
    .btn.accent:hover { background: var(--fg); border-color: var(--fg); color: var(--bg); }
    .btn.small { padding: 4px 8px; font-size: 0.72rem; }

    #session-status {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--fg-faint);
    }

    /* ── Grid ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: none;
    }

    /* ── Cage card ───────────────────────────────────────── */
    .cage-card {
      background: var(--bg);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cage-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dead);
      flex-shrink: 0;
    }
    .status-dot.alive { background: var(--alive); }

    .cage-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-faint);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .camera-lost {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(205, 20, 20, 0.85);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
      flex-direction: column;
    }
    .camera-lost.visible { display: flex; }

    .cage-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cage-img-wrap .no-feed {
      font-size: 0.7rem;
      color: var(--fg-faint);
      letter-spacing: 0.05em;
    }

    .cage-stats {
      display: flex;
      gap: 12px;
      font-size: 0.72rem;
      color: var(--fg-faint);
    }

    .cage-stats span { font-weight: 600; color: var(--fg); }

    .cage-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Trial Builder ──────────────────────────────────── */
    #builder {
      padding: 24px;
      border-top: 2px solid var(--fg);
    }

    #bldr-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    #bldr-header h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bldr-label {
      font-size: 0.78rem;
      color: var(--fg-faint);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bldr-input {
      border: 1px solid var(--border);
      background: var(--bg-faint);
      padding: 5px 8px;
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      color: var(--fg);
    }
    .bldr-input:focus { border-color: var(--fg); }

    #bldr-states-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bldr-state-card {
      border: 1.5px solid var(--border);
      padding: 14px;
    }

    .bldr-state-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .bldr-state-id {
      border: none;
      border-bottom: 1.5px solid var(--fg);
      background: transparent;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      outline: none;
      width: 160px;
      padding: 2px 0;
    }

    .bldr-phase-block { margin-bottom: 10px; }

    .bldr-phase-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-faint);
      margin-bottom: 6px;
    }

    .bldr-action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .bldr-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-faint);
      font-size: 0.8rem;
      padding: 2px 6px;
      font-family: inherit;
    }
    .bldr-remove:hover { color: var(--dead); }

    #bldr-json {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      background: var(--bg-faint);
      padding: 10px;
      resize: vertical;
      outline: none;
      margin-top: 6px;
      color: var(--fg);
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--fg);
      color: var(--bg);
      padding: 10px 18px;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>BMI Closed Loop</h1>
  <input type="text" id="inp-session" placeholder="session name" />
  <input type="text" id="inp-researcher" placeholder="researcher" />
  <button class="btn accent" onclick="openSession()">Open Session</button>
  <button class="btn" onclick="closeSession()">Close Session</button>
  <span id="session-status">no session</span>
</header>

<div class="grid" id="cage-grid"></div>

<section id="builder">
  <div id="bldr-header">
    <h2>Trial Builder</h2>
    <span class="bldr-label">Cage
      <select id="bldr-cage" class="bldr-input"></select>
    </span>
    <span class="bldr-label">Trial ID
      <input id="bldr-trial-id" class="bldr-input" value="trial_001"
             style="width:120px;" onchange="updateJSONPreview()" />
    </span>
    <span class="bldr-label">Initial State
      <select id="bldr-initial-state" class="bldr-input"
              onchange="updateJSONPreview()">
        <option value="">—</option>
      </select>
    </span>
    <button class="btn accent" onclick="sendBuilderTrial()">Send Trial ▶</button>
    <button class="btn"        onclick="stopBuilderTrial()">Stop Trial ■</button>
  </div>

  <div id="bldr-states-container"></div>
  <button class="btn small" onclick="addState()">+ Add State</button>

  <div class="bldr-phase-label" style="margin-top:18px;">JSON Preview</div>
  <textarea id="bldr-json" readonly placeholder="Add states to preview JSON…"></textarea>
</section>

<div id="toast"></div>

<script>
  const N_CAGES = {{ n_cages }};
  let currentSessionId = null;
  let cageStatus = {};   // cage_id → {status, fps, drops}
  let streamActive = {}; // cage_id → bool

  // ── Build grid ──────────────────────────────────────────
  const grid = document.getElementById('cage-grid');
  for (let i = 1; i <= N_CAGES; i++) {
    streamActive[i] = false;
    grid.innerHTML += `
      <div class="cage-card" id="card-${i}">
        <div class="cage-header">
          <span class="cage-title">Cage ${i}</span>
          <div class="cage-stats">
            <span id="fps-${i}">—</span> fps &nbsp;
            <span id="drops-${i}">0</span> q &nbsp;
            <span id="netdrops-${i}" style="color:var(--dead)">0</span> net
          </div>
          <div class="status-dot" id="dot-${i}"></div>
        </div>
        <div class="cage-img-wrap" id="wrap-${i}">
          <span class="no-feed">no feed</span>
          <div class="camera-lost" id="lost-${i}">
            <span>&#9888; Camera Lost</span>
            <span id="lost-elapsed-${i}" style="font-size:0.65rem;font-weight:400;letter-spacing:0.05em"></span>
          </div>
        </div>
        <div class="cage-actions">
          <button class="btn small" id="btn-stream-${i}" onclick="toggleStream(${i})">Stream ▶</button>
          <button class="btn small" id="btn-trial-${i}"  onclick="startTrial(${i})">Trial ▶</button>
          <button class="btn small"                       onclick="stopTrial(${i})">Trial ■</button>
        </div>
      </div>`;
  }

  // ── Session ─────────────────────────────────────────────
  async function openSession() {
    const name       = document.getElementById('inp-session').value.trim();
    const researcher = document.getElementById('inp-researcher').value.trim();
    if (!name) { toast('Enter a session name'); return; }
    const res = await post('/session/open', { session_name: name, researcher, notes: '' });
    if (res.ok) {
      currentSessionId = res.data.session_id;
      document.getElementById('session-status').textContent =
        `session ${currentSessionId} — ${researcher || 'unknown'}`;
      toast(`Session ${currentSessionId} opened`);
    }
  }

  async function closeSession() {
    if (!currentSessionId) { toast('No session open'); return; }
    await post(`/session/${currentSessionId}/close`);
    toast(`Session ${currentSessionId} closed`);
    document.getElementById('session-status').textContent = 'no session';
    currentSessionId = null;
  }

  // ── Stream ───────────────────────────────────────────────
  async function toggleStream(id) {
    if (!streamActive[id]) {
      const res = await post(`/cage/${id}/stream/start`);
      if (res.ok && res.data.ok) {
        streamActive[id] = true;
        startImageRefresh(id);
        document.getElementById(`btn-stream-${id}`).textContent = 'Stream ■';
        toast(`Cage ${id} streaming`);
      } else {
        toast(`Cage ${id}: ${res.data?.msg || 'failed'}`);
      }
    } else {
      await post(`/cage/${id}/stream/stop`);
      streamActive[id] = false;
      stopImageRefresh(id);
      document.getElementById(`btn-stream-${id}`).textContent = 'Stream ▶';
      document.getElementById(`wrap-${id}`).innerHTML = '<span class="no-feed">no feed</span>';
    }
  }

  // ── Trial (cage card buttons use the builder's JSON) ─────
  async function startTrial(id) {
    if (!bldrStates.length) { toast('Build a trial first — see Trial Builder below'); return; }
    const res = await post(`/cage/${id}/trial/start`, buildTrialJSON());
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'trial started' : 'failed')}`);
  }

  async function stopTrial(id) {
    const res = await post(`/cage/${id}/trial/stop`);
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'trial stopped' : 'failed')}`);
  }

  // ── Live image refresh ───────────────────────────────────
  const refreshTimers = {};

  function startImageRefresh(id) {
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = 'none';

    let img = document.getElementById(`img-${id}`);
    if (!img) {
      img = document.createElement('img');
      img.id = `img-${id}`;
      img.alt = `cage ${id}`;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      wrap.insertBefore(img, wrap.querySelector('.camera-lost'));
    }

    function refresh() {
      const next = new Image();
      next.onload = () => { img.src = next.src; };
      next.src = `/cage/${id}/frame?t=${Date.now()}`;
    }
    refresh();
    refreshTimers[id] = setInterval(refresh, 16.7);
  }

  function stopImageRefresh(id) {
    clearInterval(refreshTimers[id]);
    delete refreshTimers[id];
    const img = document.getElementById(`img-${id}`);
    if (img) img.remove();
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = '';
  }

  // ── Status polling ───────────────────────────────────────
  async function pollStatus() {
    try {
      const res = await fetch('/cameras/status');
      if (!res.ok) return;
      const data = await res.json();
      for (const [key, val] of Object.entries(data)) {
        const id = parseInt(key.replace('cage_', ''));
        const parts = val.split('|');
        const alive = parts[0] === 'alive';
        const fps      = parts.find(p => p.startsWith('fps='))?.split('=')[1] ?? '—';
        const drops    = parts.find(p => p.startsWith('drops='))?.split('=')[1] ?? '0';
        const netDrops = parts.find(p => p.startsWith('net_drops='))?.split('=')[1] ?? '0';

        const lastSeen = parseFloat(parts.find(p => p.startsWith('last_seen='))?.split('=')[1] ?? '0');

        const dot = document.getElementById(`dot-${id}`);
        if (dot) dot.className = 'status-dot' + (alive ? ' alive' : '');
        const fpsEl = document.getElementById(`fps-${id}`);
        if (fpsEl) fpsEl.textContent = fps;
        const dropEl = document.getElementById(`drops-${id}`);
        if (dropEl) dropEl.textContent = drops;
        const netDropEl = document.getElementById(`netdrops-${id}`);
        if (netDropEl) {
          netDropEl.textContent = netDrops;
          netDropEl.style.color = netDrops === '0' ? 'var(--fg-faint)' : 'var(--dead)';
        }

        const lostEl = document.getElementById(`lost-${id}`);
        if (lostEl) {
          const wasSeen = lastSeen > 0;
          const show = !alive && wasSeen;
          lostEl.classList.toggle('visible', show);
          if (show) {
            const elapsed = Math.round(Date.now() / 1000 - lastSeen);
            document.getElementById(`lost-elapsed-${id}`).textContent = `silent for ${elapsed}s`;
          }
        }
      }
    } catch (_) {}
  }

  setInterval(pollStatus, 1000);
  pollStatus();

  // ── Helpers ──────────────────────────────────────────────
  async function post(url, body = null) {
    try {
      const opts = { method: 'POST' };
      if (body) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(url, opts);
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, data };
    } catch (e) {
      return { ok: false, data: { msg: e.message } };
    }
  }

  // ── Trial Builder ─────────────────────────────────────────
  const ACTION_TYPES  = ['led_on','led_off','valve_open','valve_close','play_audio'];
  const ALL_TARGETS   = ['left','right','center'];
  const TRIGGER_TYPES = ['ir_break','timeout'];

  let bldrStates     = [];
  let bldrStateCount = 1;

  // Populate cage dropdown once
  const bldrCageSel = document.getElementById('bldr-cage');
  for (let i = 1; i <= N_CAGES; i++)
    bldrCageSel.innerHTML += `<option value="${i}">Cage ${i}</option>`;

  function addState() {
    bldrStates.push({ id: `state_${bldrStateCount++}`, duration: null,
                      entry_actions: [], exit_actions: [], transitions: [] });
    renderBuilder();
  }

  function removeState(idx) { bldrStates.splice(idx, 1); renderBuilder(); }

  function updateStateField(idx, field, value) {
    bldrStates[idx][field] = field === 'duration'
      ? (value === '' ? null : parseFloat(value)) : value;
    if (field === 'id') updateInitialStateOptions();
    updateJSONPreview();
  }

  function addAction(si, phase) {
    bldrStates[si][phase].push({ type: 'led_on', target: 'center' });
    renderBuilder();
  }
  function removeAction(si, phase, ai) { bldrStates[si][phase].splice(ai,1); renderBuilder(); }
  function updateAction(si, phase, ai, field, value) {
    bldrStates[si][phase][ai][field] = value; updateJSONPreview();
  }

  function addTransition(si) {
    bldrStates[si].transitions.push({ trigger: 'timeout', target: 'center', next_state: '__end__' });
    renderBuilder();
  }
  function removeTransition(si, ti) { bldrStates[si].transitions.splice(ti,1); renderBuilder(); }
  function updateTransition(si, ti, field, value) {
    bldrStates[si].transitions[ti][field] = value;
    if (field === 'trigger') renderBuilder(); else updateJSONPreview();
  }

  function opts(list, selected) {
    return list.map(v => `<option value="${v}"${v===selected?' selected':''}>${v}</option>`).join('');
  }

  function renderStateCard(s, idx) {
    const renderActions = phase => s[phase].map((a, ai) => `
      <div class="bldr-action-row">
        <select class="bldr-input" onchange="updateAction(${idx},'${phase}',${ai},'type',this.value)">${opts(ACTION_TYPES,a.type)}</select>
        <select class="bldr-input" onchange="updateAction(${idx},'${phase}',${ai},'target',this.value)">${opts(ALL_TARGETS,a.target)}</select>
        <button class="bldr-remove" onclick="removeAction(${idx},'${phase}',${ai})">✕</button>
      </div>`).join('');

    const renderTransitions = () => s.transitions.map((t, ti) => `
      <div class="bldr-action-row">
        <select class="bldr-input" onchange="updateTransition(${idx},${ti},'trigger',this.value)">${opts(TRIGGER_TYPES,t.trigger)}</select>
        ${t.trigger==='ir_break'
          ? `<select class="bldr-input" onchange="updateTransition(${idx},${ti},'target',this.value)">${opts(ALL_TARGETS,t.target)}</select>`
          : `<span style="display:inline-block;width:98px"></span>`}
        <span style="color:var(--fg-faint);padding:0 4px;">→</span>
        <input class="bldr-input" type="text" value="${t.next_state}" placeholder="next state"
               style="width:130px;" onchange="updateTransition(${idx},${ti},'next_state',this.value)" />
        <button class="bldr-remove" onclick="removeTransition(${idx},${ti})">✕</button>
      </div>`).join('');

    return `
      <div class="bldr-state-card">
        <div class="bldr-state-header">
          <input class="bldr-state-id" value="${s.id}"
                 onchange="updateStateField(${idx},'id',this.value)" />
          <span class="bldr-label">duration
            <input class="bldr-input" type="number" step="0.1" min="0"
                   value="${s.duration??''}" placeholder="none" style="width:70px;"
                   onchange="updateStateField(${idx},'duration',this.value)" /> s
          </span>
          <button class="bldr-remove" onclick="removeState(${idx})">✕ remove</button>
        </div>
        <div class="bldr-phase-block">
          <div class="bldr-phase-label">Entry Actions</div>
          ${renderActions('entry_actions')}
          <button class="btn small" onclick="addAction(${idx},'entry_actions')">+ entry action</button>
        </div>
        <div class="bldr-phase-block">
          <div class="bldr-phase-label">Exit Actions</div>
          ${renderActions('exit_actions')}
          <button class="btn small" onclick="addAction(${idx},'exit_actions')">+ exit action</button>
        </div>
        <div class="bldr-phase-block">
          <div class="bldr-phase-label">Transitions</div>
          ${renderTransitions()}
          <button class="btn small" onclick="addTransition(${idx})">+ transition</button>
        </div>
      </div>`;
  }

  function renderBuilder() {
    document.getElementById('bldr-states-container').innerHTML =
      bldrStates.map((s,i) => renderStateCard(s,i)).join('');
    updateInitialStateOptions();
    updateJSONPreview();
  }

  function updateInitialStateOptions() {
    const sel = document.getElementById('bldr-initial-state');
    const cur = sel.value;
    sel.innerHTML = bldrStates.length
      ? bldrStates.map(s => `<option value="${s.id}"${s.id===cur?' selected':''}>${s.id}</option>`).join('')
      : '<option value="">—</option>';
  }

  function buildTrialJSON() {
    return {
      trial_id:      document.getElementById('bldr-trial-id').value.trim() || 'trial',
      initial_state: document.getElementById('bldr-initial-state').value || bldrStates[0]?.id || '',
      states: bldrStates.map(s => {
        const state = {
          id:            s.id,
          entry_actions: s.entry_actions.map(a => ({...a})),
          exit_actions:  s.exit_actions.map(a => ({...a})),
          transitions:   s.transitions.map(t => {
            const tr = { trigger: t.trigger, next_state: t.next_state };
            if (t.trigger === 'ir_break') tr.target = t.target;
            return tr;
          }),
        };
        if (s.duration !== null && !isNaN(s.duration)) state.duration = s.duration;
        return state;
      }),
    };
  }

  function updateJSONPreview() {
    document.getElementById('bldr-json').value =
      bldrStates.length ? JSON.stringify(buildTrialJSON(), null, 2) : '';
  }

  async function sendBuilderTrial() {
    if (!bldrStates.length) { toast('Add at least one state first'); return; }
    const cage = parseInt(document.getElementById('bldr-cage').value);
    const res  = await post(`/cage/${cage}/trial/start`, buildTrialJSON());
    toast(`Cage ${cage}: ${res.data?.msg || (res.data?.ok !== false ? 'trial started' : 'failed')}`);
  }

  async function stopBuilderTrial() {
    const cage = parseInt(document.getElementById('bldr-cage').value);
    const res  = await post(`/cage/${cage}/trial/stop`);
    toast(`Cage ${cage}: ${res.data?.msg || (res.ok ? 'trial stopped' : 'failed')}`);
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
