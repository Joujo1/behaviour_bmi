<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Closed Loop</title>
  <style>
    :root {
      font-family: Futura, Inter, system-ui, Helvetica, Arial, sans-serif;
      --bg:       #ffffff;
      --bg-faint: #f0f0f0;
      --fg:       #000000;
      --fg-faint: #888888;
      --accent:   #ffd000;
      --alive:    rgb(64, 202, 114);
      --dead:     rgb(205, 20, 20);
      --border:   #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 2px solid var(--fg);
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 8px;
    }

    header input {
      border: 1px solid var(--border);
      background: var(--bg-faint);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      width: 160px;
    }

    header input:focus { border-color: var(--fg); }

    .btn {
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid var(--fg);
      background: var(--bg);
      color: var(--fg);
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: var(--fg); color: var(--bg); }
    .btn.accent { background: var(--accent); border-color: var(--accent); color: var(--fg); }
    .btn.accent:hover { background: var(--fg); border-color: var(--fg); color: var(--bg); }
    .btn.small { padding: 4px 8px; font-size: 0.72rem; }

    #session-status {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--fg-faint);
    }

    /* ── Grid ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: none;
    }

    /* ── Cage card ───────────────────────────────────────── */
    .cage-card {
      background: var(--bg);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cage-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dead);
      flex-shrink: 0;
    }
    .status-dot.alive { background: var(--alive); }

    .cage-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-faint);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .camera-lost {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(205, 20, 20, 0.85);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
      flex-direction: column;
    }
    .camera-lost.visible { display: flex; }

    .cage-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cage-img-wrap .no-feed {
      font-size: 0.7rem;
      color: var(--fg-faint);
      letter-spacing: 0.05em;
    }

    .cage-stats {
      display: flex;
      gap: 12px;
      font-size: 0.72rem;
      color: var(--fg-faint);
    }

    .cage-stats span { font-weight: 600; color: var(--fg); }

    .cage-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Dev strip ───────────────────────────────────────────── */
    #dev-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 24px;
      background: var(--bg-faint);
      border-bottom: 1px solid var(--border);
    }

    #dev-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--fg-faint);
      margin-right: 4px;
    }

    /* ── Metrics grid ───────────────────────────────────────── */
    #metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: 2px solid var(--fg);
    }

    .metric-card {
      background: var(--bg);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .metric-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .metric-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .metric-last-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .metric-last-dot.success { background: var(--alive); }
    .metric-last-dot.fail    { background: var(--dead); }

    .metric-row {
      display: flex;
      gap: 12px;
      font-size: 0.72rem;
      color: var(--fg-faint);
      flex-wrap: wrap;
    }

    .metric-row b { color: var(--fg); font-weight: 600; }

    .metric-pct {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* ── Trial Runner ────────────────────────────────────── */
    #trial-runner {
      padding: 18px 24px;
      border-top: 2px solid var(--fg);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    #trial-runner h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .runner-label {
      font-size: 0.78rem;
      color: var(--fg-faint);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .runner-input {
      border: 1px solid var(--border);
      background: var(--bg-faint);
      padding: 5px 8px;
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      color: var(--fg);
    }
    .runner-input:focus { border-color: var(--fg); }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--fg);
      color: var(--bg);
      padding: 10px 18px;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>BMI Closed Loop</h1>
  <input type="text" id="inp-session" placeholder="session name" />
  <input type="text" id="inp-researcher" placeholder="researcher" />
  <button class="btn accent" onclick="openSession()">Open Session</button>
  <button class="btn" onclick="closeSession()">Close Session</button>
  <span id="session-status">no session</span>
</header>

<div id="dev-strip">
  <span id="dev-label">DEV</span>
  <button class="btn small" onclick="truncate('trial_results')">Truncate trial_results</button>
  <button class="btn small" onclick="truncate('trial_configs')">Truncate trial_configs</button>
  <button class="btn small" onclick="truncate('recordings')">Truncate recordings</button>
</div>

<div class="grid" id="cage-grid"></div>

<div id="metrics-grid"></div>

<section id="trial-runner">
  <h2>Trial Runner</h2>
  <span class="runner-label">Config
    <select id="runner-config" class="runner-input" style="width:220px">
      <option value="">— select trial —</option>
    </select>
  </span>
  <button class="btn small" onclick="loadTrialConfigs()">↻</button>
  <span class="runner-label">Reps
    <input id="runner-reps" class="runner-input" type="number" min="1" value="10" style="width:60px" />
  </span>
  <span class="runner-label">ITI (s)
    <input id="runner-iti" class="runner-input" type="number" min="0" step="0.5" value="5" style="width:60px" />
  </span>
  <span class="runner-label">Fail ITI (s)
    <input id="runner-fail-iti" class="runner-input" type="number" min="0" step="0.5" value="15" style="width:60px" />
  </span>
  <a href="/builder" class="btn small" style="text-decoration:none;margin-left:auto">Trial Builder ↗</a>
</section>

<div id="toast"></div>

<script>
  const N_CAGES = {{ n_cages }};
  let currentSessionId = null;
  let cageStatus = {};   // cage_id → {status, fps, drops}
  let streamActive = {}; // cage_id → bool

  // ── Build grid ──────────────────────────────────────────
  const grid = document.getElementById('cage-grid');
  for (let i = 1; i <= N_CAGES; i++) {
    streamActive[i] = false;
    grid.innerHTML += `
      <div class="cage-card" id="card-${i}">
        <div class="cage-header">
          <span class="cage-title">Cage ${i}</span>
          <div class="cage-stats">
            <span id="fps-${i}">—</span> fps &nbsp;
            <span id="drops-${i}">0</span> q &nbsp;
            <span id="netdrops-${i}" style="color:var(--dead)">0</span> net
          </div>
          <div class="status-dot" id="dot-${i}"></div>
        </div>
        <div class="cage-img-wrap" id="wrap-${i}">
          <span class="no-feed">no feed</span>
          <div class="camera-lost" id="lost-${i}">
            <span>&#9888; Camera Lost</span>
            <span id="lost-elapsed-${i}" style="font-size:0.65rem;font-weight:400;letter-spacing:0.05em"></span>
          </div>
        </div>
        <div class="cage-actions">
          <button class="btn small" id="btn-stream-${i}" onclick="toggleStream(${i})">Stream ▶</button>
          <button class="btn small" id="btn-trial-${i}"  onclick="startTrial(${i})">Trial ▶</button>
          <button class="btn small"                       onclick="stopTrial(${i})">Trial ■</button>
        </div>
      </div>`;
  }

  // ── Session ─────────────────────────────────────────────
  async function openSession() {
    const name       = document.getElementById('inp-session').value.trim();
    const researcher = document.getElementById('inp-researcher').value.trim();
    if (!name) { toast('Enter a session name'); return; }
    const res = await post('/session/open', { session_name: name, researcher, notes: '' });
    if (res.ok) {
      currentSessionId = res.data.session_id;
      document.getElementById('session-status').textContent =
        `session ${currentSessionId} — ${researcher || 'unknown'}`;
      toast(`Session ${currentSessionId} opened`);
    }
  }

  async function closeSession() {
    if (!currentSessionId) { toast('No session open'); return; }
    await post(`/session/${currentSessionId}/close`);
    toast(`Session ${currentSessionId} closed`);
    document.getElementById('session-status').textContent = 'no session';
    currentSessionId = null;
  }

  // ── Stream ───────────────────────────────────────────────
  async function toggleStream(id) {
    if (!streamActive[id]) {
      const res = await post(`/cage/${id}/stream/start`);
      if (res.ok && res.data.ok) {
        streamActive[id] = true;
        startImageRefresh(id);
        document.getElementById(`btn-stream-${id}`).textContent = 'Stream ■';
        toast(`Cage ${id} streaming`);
      } else {
        toast(`Cage ${id}: ${res.data?.msg || 'failed'}`);
      }
    } else {
      await post(`/cage/${id}/stream/stop`);
      streamActive[id] = false;
      stopImageRefresh(id);
      document.getElementById(`btn-stream-${id}`).textContent = 'Stream ▶';
      document.getElementById(`wrap-${id}`).innerHTML = '<span class="no-feed">no feed</span>';
    }
  }

  // ── Trial runner ─────────────────────────────────────────
  async function loadTrialConfigs() {
    try {
      const res  = await fetch('/trial-configs');
      const data = await res.json();
      const sel  = document.getElementById('runner-config');
      sel.innerHTML = '<option value="">— select trial —</option>' +
        data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      toast(`Loaded ${data.length} trial config(s)`);
    } catch (e) {
      toast(`Failed to load configs: ${e.message}`);
    }
  }

  async function startTrial(id) {
    const configId  = parseInt(document.getElementById('runner-config').value);
    const nReps     = parseInt(document.getElementById('runner-reps').value)    || 1;
    const baseIti   = parseFloat(document.getElementById('runner-iti').value)   || 5;
    const failIti   = parseFloat(document.getElementById('runner-fail-iti').value) || 15;
    if (!configId) { toast('Select a trial config first'); return; }
    const res = await post(`/cage/${id}/trial/run`, {
      trial_config_id: configId,
      n_reps:          nReps,
      base_iti_s:      baseIti,
      fail_iti_s:      failIti,
    });
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'run started' : 'failed')}`);
  }

  async function stopTrial(id) {
    const res = await post(`/cage/${id}/trial/run/stop`);
    toast(`Cage ${id}: ${res.data?.msg || (res.ok ? 'stop requested' : 'failed')}`);
  }

  // Load configs on page load
  loadTrialConfigs();

  // ── Dev helpers ───────────────────────────────────────────
  async function truncate(table) {
    if (!confirm(`Truncate ${table}? This cannot be undone.`)) return;
    const res = await post(`/dev/truncate/${table}`);
    toast(res.data?.msg || (res.ok ? 'done' : 'failed'));
    if (res.ok) pollMetrics();
  }

  // ── Live image refresh ───────────────────────────────────
  const refreshTimers = {};

  function startImageRefresh(id) {
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = 'none';

    let img = document.getElementById(`img-${id}`);
    if (!img) {
      img = document.createElement('img');
      img.id = `img-${id}`;
      img.alt = `cage ${id}`;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      wrap.insertBefore(img, wrap.querySelector('.camera-lost'));
    }

    function refresh() {
      const next = new Image();
      next.onload = () => { img.src = next.src; };
      next.src = `/cage/${id}/frame?t=${Date.now()}`;
    }
    refresh();
    refreshTimers[id] = setInterval(refresh, 16.7);
  }

  function stopImageRefresh(id) {
    clearInterval(refreshTimers[id]);
    delete refreshTimers[id];
    const img = document.getElementById(`img-${id}`);
    if (img) img.remove();
    const wrap = document.getElementById(`wrap-${id}`);
    const noFeed = wrap.querySelector('.no-feed');
    if (noFeed) noFeed.style.display = '';
  }

  // ── Status polling ───────────────────────────────────────
  async function pollStatus() {
    try {
      const res = await fetch('/cameras/status');
      if (!res.ok) return;
      const data = await res.json();
      for (const [key, val] of Object.entries(data)) {
        const id = parseInt(key.replace('cage_', ''));
        const parts = val.split('|');
        const alive = parts[0] === 'alive';
        const fps      = parts.find(p => p.startsWith('fps='))?.split('=')[1] ?? '—';
        const drops    = parts.find(p => p.startsWith('drops='))?.split('=')[1] ?? '0';
        const netDrops = parts.find(p => p.startsWith('net_drops='))?.split('=')[1] ?? '0';

        const lastSeen = parseFloat(parts.find(p => p.startsWith('last_seen='))?.split('=')[1] ?? '0');

        const dot = document.getElementById(`dot-${id}`);
        if (dot) dot.className = 'status-dot' + (alive ? ' alive' : '');
        const fpsEl = document.getElementById(`fps-${id}`);
        if (fpsEl) fpsEl.textContent = fps;
        const dropEl = document.getElementById(`drops-${id}`);
        if (dropEl) dropEl.textContent = drops;
        const netDropEl = document.getElementById(`netdrops-${id}`);
        if (netDropEl) {
          netDropEl.textContent = netDrops;
          netDropEl.style.color = netDrops === '0' ? 'var(--fg-faint)' : 'var(--dead)';
        }

        const lostEl = document.getElementById(`lost-${id}`);
        if (lostEl) {
          const wasSeen = lastSeen > 0;
          const show = !alive && wasSeen;
          lostEl.classList.toggle('visible', show);
          if (show) {
            const elapsed = Math.round(Date.now() / 1000 - lastSeen);
            document.getElementById(`lost-elapsed-${id}`).textContent = `silent for ${elapsed}s`;
          }
        }
      }
    } catch (_) {}
  }

  setInterval(pollStatus, 1000);
  pollStatus();

  // ── Metrics polling ──────────────────────────────────────
  async function pollMetrics() {
    try {
      const res  = await fetch('/metrics');
      if (!res.ok) return;
      const data = await res.json();

      // Index by cage_id for quick lookup
      const byId = {};
      data.forEach(m => { byId[m.cage_id] = m; });

      const grid = document.getElementById('metrics-grid');
      let html = '';
      for (let i = 1; i <= N_CAGES; i++) {
        const m = byId[i];
        if (!m) {
          html += `
            <div class="metric-card">
              <div class="metric-card-header">
                <span class="metric-title">Cage ${i}</span>
                <div class="metric-last-dot"></div>
              </div>
              <div class="metric-pct" style="color:var(--fg-faint)">—</div>
              <div class="metric-row">no data</div>
            </div>`;
          continue;
        }
        const lastDot = m.last_aborted === null ? '' : m.last_aborted ? 'fail' : 'success';
        const avgSucc = m.avg_success_s !== null ? `${m.avg_success_s}s` : '—';
        const avgFail = m.avg_fail_s    !== null ? `${m.avg_fail_s}s`    : '—';
        html += `
          <div class="metric-card">
            <div class="metric-card-header">
              <span class="metric-title">Cage ${i}</span>
              <div class="metric-last-dot ${lastDot}"></div>
            </div>
            <div class="metric-pct">${m.success_pct}%</div>
            <div class="metric-row">
              <span><b>${m.successes}</b> ok</span>
              <span><b>${m.failures}</b> fail</span>
              <span><b>${m.total}</b> total</span>
            </div>
            <div class="metric-row">
              <span>avg ok <b>${avgSucc}</b></span>
              <span>avg fail <b>${avgFail}</b></span>
            </div>
          </div>`;
      }
      grid.innerHTML = html;
    } catch (_) {}
  }

  setInterval(pollMetrics, 5000);
  pollMetrics();

  // ── Helpers ──────────────────────────────────────────────
  async function post(url, body = null) {
    try {
      const opts = { method: 'POST' };
      if (body) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(url, opts);
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, data };
    } catch (e) {
      return { ok: false, data: { msg: e.message } };
    }
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
